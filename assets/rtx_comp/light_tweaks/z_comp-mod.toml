# ##########################################################################################################################################
# >> Allow Game Lights
# 
# :: This can be used to whitelist disabled filler lights
# :: Only useful if 'ignore filler lights' is enabled
# 
# :: How to retrieve hashes:
#    > Visualize hashes in 3D Space (GUI -> Map Settings -> Ignore Game Lights -> Draw Hash Visualization)
#    > DoubleClick hashes in list to allow lights and export to clipboard when done -> override ALLOW_LIGHTS with clipboard data
#
# ~~ ALLOW_LIGHTS = [
#     0x0, 0x1, 0x2, ...            [uint array - hex format]
# ]      

ALLOW_LIGHTS = [
    0x8C8CB2FC
]



# ##########################################################################################################################################
# >> Light Overrides
# 
# :: This can be used to override light settings.
# :: Requires a stable light hash!
#
# :: How to retrieve hashes & create overrides:
#    > Visualize hashes in 3D Space (GUI -> Map Settings -> Game Light Tweaks -> Visualize Api Light Hashes)
#    > Select hash in list and tweak settings. Make sure to export to clipboard when done -> override LIGHT_OVERRIDES with clipboard data
#
# :: Notes:
#    > Categories: Use category format to organize related overrides together (optional)
#    > Attached lights: Create multiple lights attached to a single base hash (useful for adding extra light sources)
#    > Priority: TOML files are processed in alphabetical order (earlier files have higher priority)
#    > Comments: Comments above entries are preserved and can be used as identifiers
#
# ~~ LIGHT_OVERRIDES = [
#   {          
#       #                   comment         
#       hash =              hash of light                                   [uint - hex format]   
#       pos = []            position of light                        [opt.] [3D Vector]
#       dir = []            direction of light                       [opt.] [3D Vector]
#       color = []          color of light                           [opt.] [3D Vector]
#       radius =            radius of light                          [opt.] [Float]
#       intensity =         intensity of light                       [opt.] [Float]
#       outer_cone_angle =  outer cone angle of light                [opt.] [Float]
#       inner_cone_angle =  inner cone angle of light                [opt.] [Float]
#       volumetric_scale =  volumetric scale of light                [opt.] [Float]
#       light_type =        0: sphere -- 1: spotlight                [opt.] [Bool]
#       attached = [        attached lights for this hash            [opt.] [Array of light override structures]
#       {
#           ... light override
#       },
#       { ... }]       
#   }, 
#   {
#       category =          category name                                   [String]
#       overrides = [       light overrides                                 [Array of light override structures]
#       {
#           ... light override
#       },
#       { ... }]      
#   },
#   { ... },
# ]      

